# GPU server deployment for booth-gpu.
#
# Quick start on the server (after `git clone` + `cd booth-gpu`):
#
#   mkdir -p data out models
#   cp /path/to/your_plan.pdf data/
#   INPUT=/data/your_plan.pdf docker compose up --build
#
# `docker compose up` builds the image (first time) and runs the pipeline on
# $INPUT, writing results to ./out. Tune behaviour with the other env vars below,
# e.g.:
#   INPUT=/data/plan.jpg FP_POLICY=strict docker compose up
#   INPUT=/data/plan.pdf EXTRA_ARGS="--dpi 300 --workers 8" docker compose up --build
#
# Requires the NVIDIA Container Toolkit on the host. Verify with:
#   docker run --rm --gpus all nvidia/cuda:12.1.0-base-ubuntu22.04 nvidia-smi
services:
  booth:
    build: .
    image: booth-gpu:latest
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Optional Roboflow hall-model key (only used with --roboflow-hall).
      # Passed from host env; never baked into the image.
      - ROBOFLOW_HALL_API_KEY=${ROBOFLOW_HALL_API_KEY:-}
    volumes:
      - ./data:/data       # put input plans here
      - ./out:/data/out    # results land here (*_boxes.json / *.png)
      - ./models:/models   # EasyOCR weights persist across runs
    # Run the pipeline on $INPUT. Override knobs via env (see header).
    command: >
      --input ${INPUT:?set INPUT=/data/<your_plan>.pdf}
      --fp-policy ${FP_POLICY:-shape}
      --ocr ${OCR:-auto}
      --outdir /data/out
      ${EXTRA_ARGS:-}
